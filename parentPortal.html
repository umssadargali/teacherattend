<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Iqra Public School</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --secondary: #4caf50; --bg: #f1f8e9; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header Card */
        .main-card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        h2 { color: var(--primary); margin: 0 0 5px 0; font-weight: 600; font-size: 22px; }
        p { color: #666; margin: 0 0 20px 0; font-size: 14px; }

        select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 15px; outline: none; margin-bottom: 15px; background: #fafafa; }
        .btn-check { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 16px; transition: 0.3s; }
        .btn-check:hover { background: var(--secondary); transform: translateY(-2px); }

        /* Results Section */
        #resultsArea { width: 100%; max-width: 400px; }
        .attendance-card { background: white; margin-bottom: 15px; padding: 15px; border-radius: 16px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--primary); transition: 0.3s; animation: slideUp 0.4s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .student-photo { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; border: 2px solid #eee; margin-right: 15px; background: #f9f9f9; }
        .details { flex: 1; }
        .details b { color: #333; font-size: 13px; display: block; margin-bottom: 3px; }
        .details span { color: #555; font-size: 14px; display: block; margin-bottom: 8px; font-family: monospace; }
        
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .in { background: #e8f5e9; color: #2e7d32; }
        .out { background: #fff3e0; color: #ef6c00; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <h2>Iqra Public School</h2>
    <p>Parent Tracking Portal</p>
    
    <select id="studentSelect">
        <option value="">Select Student Name</option>
    </select>
    
    <button class="btn-check" onclick="search()">VIEW ATTENDANCE</button>
    <div id="loader" class="loader"></div>
</div>

<div id="resultsArea"></div>

<script>
    // --- APNA SCRIPT URL YAHAN DALEIN ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFnvGKyVIATmbIGxXyVjt7NjKM8dRHMKElJB0uVbxWn_7LAQHw33P3VxImxos2N3sv1A/exec"; 

    // Page Load hote hi names fetch karna
    window.onload = function() {
        fetch(SCRIPT_URL + "?getNames=true")
        .then(res => res.json())
        .then(list => {
            let select = document.getElementById('studentSelect');
            list.forEach(name => {
                if(name) {
                    let opt = document.createElement('option');
                    opt.value = name; opt.textContent = name;
                    select.appendChild(opt);
                }
            });
        });
    };

    function search() {
        let name = document.getElementById('studentSelect').value;
        if(!name) return alert("Pehle Student ka naam chunein!");

        document.getElementById('resultsArea').innerHTML = "";
        document.getElementById('loader').style.display = "block";

        fetch(SCRIPT_URL + "?getAttendance=true&name=" + encodeURIComponent(name))
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = "none";
            let html = "";
            if(data.length === 0) html = "<p style='text-align:center; color:#666;'>No records found.</p>";
            
            data.forEach(row => {
                // Photo URL Fix for Google Drive
                let imgUrl = "https://cdn-icons-png.flaticon.com/512/149/149071.png"; // Default
                if (row.photo && row.photo.includes('id=')) {
                    let id = row.photo.split('id=')[1];
                    imgUrl = "https://lh3.googleusercontent.com/d/" + id;
                } else if (row.photo && row.photo.includes('/d/')) {
                    let id = row.photo.split('/d/')[1].split('/')[0];
                    imgUrl = "https://lh3.googleusercontent.com/d/" + id;
                }

                html += `
                <div class="attendance-card">
                    <img src="${imgUrl}" class="student-photo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                    <div class="details">
                        <span class="status-badge in">Entry</span>
                        <span>${row.entry}</span>
                        <span class="status-badge out">Exit</span>
                        <span>${row.exit}</span>
                    </div>
                </div>`;
            });
            document.getElementById('resultsArea').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('loader').style.display = "none";
            alert("Connection Error!");
        });
    }
</script>

</body>
</html>
