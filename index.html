<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMS Sadar Gali Attendance</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 360px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin: 5px 0; font-size: 20px; }
        #clock { font-size: 42px; font-weight: bold; color: #ff5722; font-family: monospace; margin: 5px 0; }
        #date { font-size: 14px; color: #666; margin-bottom: 10px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 15px; }
        .cam-box { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid #4CAF50; background: #000; aspect-ratio: 4/3; margin-bottom: 10px; }
        video, img { width: 100%; height: 100%; object-fit: cover; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 8px; }
        .b-snap { background: #673ab7; }
        .b-in { background: #4CAF50; }
        .b-out { background: #f44336; }
        #status { font-size: 13px; font-weight: bold; margin-top: 5px; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>IQRA PUBLIC SCHOOL</h2>
    <div id="clock">00:00:00</div>
    <div id="date">Loading...</div>

    <select id="sList"><option>Fetching Names...</option></select>

    <div class="cam-box">
        <video id="v" autoplay playsinline></video>
        <img id="p" style="display:none;">
    </div>

    <button class="b-snap" onclick="snap()">📸 CAPTURE PHOTO</button>
    <button class="b-in" id="iB" onclick="send('check-in')">SCHOOL-IN</button>
    <button class="b-out" id="oB" onclick="send('check-out')">SCHOOL-OUT</button>

    <div id="status">Ready</div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFnvGKyVIATmbIGxXyVjt7NjKM8dRHMKElJB0uVbxWn_7LAQHw33P3VxImxos2N3sv1A/exec"; 

    function tick() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('en-GB');
        document.getElementById('date').innerText = n.toDateString();
    }
    setInterval(tick, 1000); tick();

    // Fetch names
    fetch(SCRIPT_URL + "?getNames=true")
        .then(r => r.json())
        .then(d => {
            let s = document.getElementById('sList'); s.innerHTML = "";
            d.forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
        }).catch(() => document.getElementById('status').innerText = "Network Error!");

    const v = document.getElementById('v');
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => v.srcObject=s);

    let b64 = "";
    function snap() {
        const cn = document.getElementById('c');
        cn.width = 250; cn.height = 180; // Small size for speed
        cn.getContext('2d').drawImage(v, 0, 0, 250, 180);
        b64 = cn.toDataURL('image/jpeg', 0.3); // Compressed
        document.getElementById('p').src = b64;
        document.getElementById('p').style.display = "block";
        v.style.display = "none";
        document.getElementById('status').innerText = "Photo Ready!";
    }

    function send(t) {
        const n = document.getElementById('sList').value;
        if(!b64) return alert("Pehle Photo Capture karein!");
        
        document.getElementById('status').innerText = "🚀 Sending Attendance...";
        document.getElementById('iB').disabled = true;
        document.getElementById('oB').disabled = true;

        navigator.geolocation.getCurrentPosition(pos => {
            finish(pos.coords.latitude + "," + pos.coords.longitude);
        }, () => finish("No GPS"), {timeout: 2000});

        function finish(l) {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({name: n, type: t, location: l, photo: b64})
            });
            alert("Attendance Success! ✅");
            location.reload();
        }
    }
</script>
</body>
</html>
